<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahid Secure Mail | Private Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #00f2fe;
            --secondary: #4facfe;
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.7);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: radial-gradient(circle at 0% 0%, #0f172a 0%, #020617 100%);
            color: #f1f5f9;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Glassmorphism Container */
        .glass-box {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 460px;
            padding: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        h2 {
            text-align: center;
            font-size: 24px;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* Inputs & Controls */
        input, textarea, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            color: #020617;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(0, 242, 254, 0.3);
            filter: brightness(1.1);
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px;
            border-radius: 14px;
            margin-bottom: 25px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 600;
            color: #64748b;
            transition: 0.3s;
        }

        .tab.active {
            background: var(--secondary);
            color: white;
        }

        /* Inbox List */
        #inbox-list {
            margin-top: 25px;
            max-height: 380px;
            overflow-y: auto;
            padding-right: 8px;
        }

        #inbox-list::-webkit-scrollbar { width: 5px; }
        #inbox-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .mail-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 18px;
            margin-bottom: 15px;
            position: relative;
            border-left: 4px solid var(--accent);
            animation: slideInRight 0.4s ease-out;
        }

        .mail-card .sender-tag {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .mail-card .msg-content {
            font-size: 14px;
            line-height: 1.5;
            color: #cbd5e1;
            word-wrap: break-word;
        }

        .del-icon {
            position: absolute;
            top: 18px;
            right: 18px;
            color: #ef4444;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.3s;
        }

        .del-icon:hover { opacity: 1; transform: scale(1.2); }

        .time-stamp {
            font-size: 10px;
            color: #475569;
            margin-top: 12px;
            display: block;
        }

        .badge {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            float: right;
        }

        .hidden { display: none; }
        
        .logout-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #ef4444;
            text-decoration: none;
            opacity: 0.7;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="glass-box animate__animated animate__fadeIn">
    <div id="auth-ui">
        <h2>Nahid Secure Mail 🛡️</h2>
        <div class="tabs">
            <div class="tab active" id="tab-login" onclick="switchAuth('login')">Login</div>
            <div class="tab" id="tab-signup" onclick="switchAuth('signup')">Sign Up</div>
        </div>

        <div id="login-form">
            <input type="text" id="l-user" placeholder="Username (যেমন: farhan)">
            <input type="password" id="l-pass" placeholder="Password">
            <button onclick="handleLogin()">🔒 Access System</button>
        </div>

        <div id="signup-form" class="hidden">
            <div style="display:flex; gap:10px;">
                <input type="text" id="fname" maxlength="10" placeholder="First Name">
                <input type="text" id="lname" maxlength="10" placeholder="Last Name">
            </div>
            <input type="text" id="city" placeholder="City">
            <input type="password" id="s-pass" placeholder="Strong Password (min 8)">
            <button onclick="handleSignUp()">Create Account</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <h2>Inbox <span id="count" class="badge">0</span></h2>
        
        <div style="background: rgba(0,0,0,0.2); padding: 18px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px;">
            <input type="text" id="to-email" placeholder="Recipient (উদা: sajid.mahmud@nahid.com)">
            <textarea id="mail-body" rows="3" placeholder="মেসেজ লিখুন..."></textarea>
            <button onclick="sendMail()" style="background: linear-gradient(135deg, #10b981, #059669); color: white;">
                <i class="fas fa-paper-plane"></i> Send Private Mail
            </button>
        </div>

        <div id="inbox-list">
            <p style="text-align:center; color:#64748b; font-size: 13px;">ইনবক্স চেক করা হচ্ছে...</p>
        </div>

        <a class="logout-link" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout System
        </a>
    </div>
</div>

<audio id="notif-beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script>
    // --- Configuration ---
    const SUPABASE_URL = 'https://osquknvjwyqvqmwnpssv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_aDplwH0DMUN7BrxBaq1cpQ_M9skNt0f';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- Auth Logic ---
    function switchAuth(type) {
        document.getElementById('login-form').classList.toggle('hidden', type === 'signup');
        document.getElementById('signup-form').classList.toggle('hidden', type === 'login');
        document.getElementById('tab-login').classList.toggle('active', type === 'login');
        document.getElementById('tab-signup').classList.toggle('active', type === 'signup');
    }

    async function handleSignUp() {
        const f = document.getElementById('fname').value.trim();
        const l = document.getElementById('lname').value.trim();
        const p = document.getElementById('s-pass').value;
        if (!f || p.length < 8) return Swal.fire('Error', 'সঠিক তথ্য দাও মামা (পাসওয়ার্ড অন্তত ৮ অক্ষরের)!', 'error');

        const email = `${f.toLowerCase()}.${l.toLowerCase()}@nahid.com`;
        const { error } = await _supabase.auth.signUp({ 
            email, 
            password: p,
            options: { data: { first_name: f, city: document.getElementById('city').value } }
        });

        if (error) Swal.fire('Error', error.message, 'error');
        else Swal.fire('Success', `অ্যাকাউন্ট তৈরি: ${email}`, 'success').then(() => switchAuth('login'));
    }

    async function handleLogin() {
        const u = document.getElementById('l-user').value.trim();
        const p = document.getElementById('l-pass').value;
        const email = u.includes('@') ? u : `${u.toLowerCase()}.mahmud@nahid.com`; // ডিফল্ট ফরম্যাট

        const { error } = await _supabase.auth.signInWithPassword({ email, password: p });
        if (error) Swal.fire('Login Failed', 'ইউজারনেম বা পাসওয়ার্ড ভুল!', 'error');
        else initApp();
    }

    // --- Messaging Logic ---
    async function sendMail() {
        const to = document.getElementById('to-email').value.trim();
        const msg = document.getElementById('mail-body').value.trim();
        
        if(!to || !msg) return Swal.fire('Wait!', 'Recipient আর Message দুইটাই লাগবে!', 'warning');

        // Security Filter (18+ & Scripts)
        const badWords = ['18+', 'adult', 'sex', 'porn', '<script', 'onclick'];
        if (badWords.some(w => msg.toLowerCase().includes(w) || to.toLowerCase().includes(w))) {
            return Swal.fire('Security Alert', 'বাজে কথা বা হ্যাকিং স্ক্রিপ্ট এলাউড না মামা! 🛑', 'error');
        }

        const { data: { user } } = await _supabase.auth.getUser();
        const { error } = await _supabase.from('mailbox').insert([{ 
            otp_code: msg, 
            sender_email: user.email, 
            receiver_email: to 
        }]);

        if (error) Swal.fire('Error', error.message, 'error');
        else {
            Swal.fire({ icon: 'success', title: 'Sent!', toast: true, position: 'top-end', timer: 2000, showConfirmButton: false });
            document.getElementById('mail-body').value = '';
        }
    }

    async function fetchInbox() {
        const { data: { user } } = await _supabase.auth.getUser();
        const { data, error } = await _supabase
            .from('mailbox')
            .select('*')
            .eq('receiver_email', user.email)
            .order('created_at', { ascending: false });

        const listDiv = document.getElementById('inbox-list');
        document.getElementById('count').innerText = data ? data.length : 0;

        if (data && data.length > 0) {
            listDiv.innerHTML = data.map(m => `
                <div class="mail-card animate__animated animate__fadeInRight">
                    <i class="fas fa-trash-alt del-icon" onclick="deleteMail('${m.id}')"></i>
                    <span class="sender-tag">FROM: ${m.sender_email}</span>
                    <div class="msg-content">${m.otp_code}</div>
                    <span class="time-stamp">${new Date(m.created_at).toLocaleString()}</span>
                </div>
            `).join('');
        } else {
            listDiv.innerHTML = '<p style="text-align:center; color:#475569; font-size:12px;">ইনবক্স খালি।</p>';
        }
    }

    async function deleteMail(id) {
        const { error } = await _supabase.from('mailbox').delete().eq('id', id);
        if (error) Swal.fire('Error', 'মুছতে পারলাম না!', 'error');
        else fetchInbox();
    }

    // --- Realtime & Init ---
    function initApp() {
        document.getElementById('auth-ui').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        fetchInbox();

        // Realtime Listener
        _supabase.channel('mailbox')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'mailbox' }, (payload) => {
            fetchInbox();
            if (payload.eventType === 'INSERT') {
                document.getElementById('notif-beep').play().catch(() => {});
            }
        }).subscribe();
    }

    function logout() { _supabase.auth.signOut().then(() => location.reload()); }

    // Auto-login if session exists
    _supabase.auth.getSession().then(({ data }) => { if (data.session) initApp(); });
</script>
</body>
</html>
